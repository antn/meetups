test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Cloudflare R2 is S3-compatible. Region is always "auto"; the endpoint points at
# the account's R2 gateway. Credentials come from env vars (set in Railway/prod).
cloudflare:
  service: S3
  access_key_id: <%= ENV["R2_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["R2_SECRET_ACCESS_KEY"] %>
  endpoint: <%= ENV["R2_ENDPOINT"] %>
  bucket: <%= ENV["R2_BUCKET"] %>
  region: auto
